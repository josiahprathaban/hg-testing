<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Endless Exploration Result Test</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f1e7;
        --panel: #fffaf1;
        --line: #d3b88e;
        --text: #2f2418;
        --muted: #6a5844;
        --accent: #9b6b2f;
        --danger: #b53328;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(255, 240, 214, 0.9), transparent 35%),
          linear-gradient(180deg, #ead8bc, #f8f2e8);
      }

      .page {
        width: min(980px, 100%);
        margin: 0 auto;
        padding: 24px;
      }

      .hero {
        margin-bottom: 18px;
      }

      .hero h1 {
        margin: 0 0 8px;
        font-size: 2rem;
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(320px, 380px) minmax(0, 1fr);
        gap: 18px;
      }

      .card {
        min-width: 0;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: 0 18px 40px rgba(76, 49, 19, 0.08);
        padding: 18px;
      }

      .card h2 {
        margin: 0 0 14px;
        font-size: 1.1rem;
      }

      .field {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
      }

      label {
        font-size: 0.88rem;
        font-weight: 700;
      }

      input,
      button {
        font: inherit;
      }

      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ccb189;
        border-radius: 10px;
        background: #fffdf8;
        color: var(--text);
      }

      .buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 11px 16px;
        cursor: pointer;
        font-weight: 700;
      }

      .primary {
        background: linear-gradient(180deg, #b37a36, #8b5a20);
        color: white;
      }

      .secondary {
        background: #efe2ce;
        color: var(--text);
        border: 1px solid #ccb189;
      }

      .status {
        padding: 10px 12px;
        border-radius: 10px;
        background: #f2e8d7;
        min-height: 44px;
      }

      .summary {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        margin-bottom: 14px;
      }

      .summary-item {
        padding: 12px;
        border-radius: 12px;
        background: #f7efe2;
        border: 1px solid #e1ccad;
      }

      .summary-label {
        display: block;
        color: var(--muted);
        font-size: 0.78rem;
        margin-bottom: 4px;
      }

      .summary-value {
        font-weight: 800;
        word-break: break-word;
      }

      pre {
        margin: 0;
        padding: 14px;
        border-radius: 12px;
        background: #1f1b16;
        color: #efe2cf;
        overflow: auto;
        max-width: 100%;
        max-height: 420px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        word-break: break-word;
        font-size: 0.84rem;
        line-height: 1.45;
      }

      .muted {
        color: var(--muted);
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .page {
          padding: 14px;
        }

        .hero h1 {
          font-size: 1.5rem;
        }

        .buttons {
          flex-direction: column;
        }

        button {
          width: 100%;
        }

        .summary {
          grid-template-columns: 1fr;
        }

        pre {
          max-height: 260px;
          font-size: 0.78rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <h1>Endless Exploration Result Test</h1>
        <p>
          This page reads the returned <code>scoreToken</code> and fetches the saved result from the
          HG World score API.
        </p>
      </header>

      <section class="grid">
        <section class="card">
          <h2>Fetch Result</h2>

          <div class="field">
            <label for="backendUrl">HG World Backend URL</label>
            <input id="backendUrl" value="https://treasuresocket.hamochi.education" />
          </div>

          <div class="field">
            <label for="scoreToken">Score Token</label>
            <input id="scoreToken" placeholder="score-token-xyz" />
          </div>

          <div class="buttons">
            <button id="fetchBtn" class="primary" type="button">Fetch Score</button>
            <button id="copyBtn" class="secondary" type="button">Copy Raw JSON</button>
            <button id="backBtn" class="secondary" type="button">Back To Launcher</button>
          </div>

          <div style="height: 12px;"></div>
          <div id="status" class="status">Waiting for score token.</div>
        </section>

        <section class="card">
          <h2>Result</h2>

          <div class="summary">
            <div class="summary-item">
              <span class="summary-label">Player</span>
              <span id="playerName" class="summary-value">-</span>
            </div>
            <div class="summary-item">
              <span class="summary-label">Game</span>
              <span id="gameId" class="summary-value">-</span>
            </div>
            <div class="summary-item">
              <span class="summary-label">Level</span>
              <span id="levelId" class="summary-value">-</span>
            </div>
            <div class="summary-item">
              <span class="summary-label">Room</span>
              <span id="roomId" class="summary-value">-</span>
            </div>
            <div class="summary-item">
              <span class="summary-label">Total Score</span>
              <span id="totalScore" class="summary-value">-</span>
            </div>
            <div class="summary-item">
              <span class="summary-label">Collection Collected</span>
              <span id="collectionCollected" class="summary-value">-</span>
            </div>
          </div>

          <div class="muted" style="margin-bottom: 8px;">Raw API Response</div>
          <pre id="resultJson">{}</pre>
        </section>
      </section>
    </main>

    <script type="module" src="./result.js"></script>
  </body>
</html>
